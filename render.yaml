# Render Blueprint — Ever After Events (backend)
# Docs: https://render.com/docs/blueprint-spec
#
# Pré-requis :
#   - Supabase project créé → Project Settings → Database → "Connection string"
#     (utiliser la "Direct connection" :5432, PAS le pooler pour les migrations).
#   - Dans le dashboard Render (Blueprint → New), renseigner les variables
#     marquées `sync: false` (secrets) au moment du déploiement.

services:
  - type: web
    name: ever-after-events-api
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckGracePeriodSeconds: 60
    autoDeploy: true

    envVars:
      # --- Application ---
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: Ever After Events API
      - key: APP_VERSION
        value: "1.0.0"

      # --- Sécurité (SECRET_KEY = secret → renseigner dans le dashboard) ---
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # --- Base de données (Supabase PostgreSQL) ---
      # Format : postgresql+asyncpg://postgres.<ref>:<password>@<host>:5432/postgres
      - key: DATABASE_URL
        sync: false

      # --- CORS : ajouter l'URL du frontend Vercel une fois déployé ---
      - key: CORS_ORIGINS
        sync: false

      # --- Rate limiting ---
      - key: RATE_LIMIT_PER_MINUTE
        value: "100"
      - key: RATE_LIMIT_CONTACT_PER_MINUTE
        value: "5"

      # --- Services tiers (optionnels en démo, à renseigner si besoin) ---
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        sync: false
